workflows:
  android-debug-build:
    name: Taroq OS - Debug APK
    max_build_duration: 30
    environment:
      java: 17
      android_signing:
        - keystore_reference
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set Android SDK licenses
        script: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Set up local.properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        script: chmod +x gradlew

      - name: Build Debug APK
        script: ./gradlew assembleDebug --no-daemon

    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
